<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container mt-5">
    <form class="d-flex align-items-center gap-2 flex-wrap" action="/login" method="post">

      <label for="name" class="fw-normal mb-0">Name</label>
      <input type="text" id="name" class="form-control" placeholder="name" style="width: auto;" name="username">

      <label for="pwd" class="fw-normal mb-0">Password</label>
      <input type="password" id="pwd" class="form-control" placeholder="password" style="width: auto;" name="password">

      <button type="submit" class="btn btn-light border">Ok</button>
    </form>
  </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</html>
