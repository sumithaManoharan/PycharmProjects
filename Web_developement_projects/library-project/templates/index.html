<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Library</title>
  </head>
  <body>
    <h1>My Library</h1>
    {% if books == [] %}
    <a>Library is empty</a>
    {% endif %}
    <ul>
      {% for book in books %}
      {% if book["title"] != None and book["author"] != None and book["rating"] != None %}
      <li><a href="{{ url_for('delete', id=book.id) }}">Delete</a> {{book.title}} - {{book.author}} - {{book.rating}}/10 <a href="{{ url_for('edit', eid=book.id) }}">Edit Rating</a></li>
      {% endif %}
      {% endfor %}
    </ul>

    <a href="{{ url_for('add') }}">Add New Book</a>
  </body>
</html>
