<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>TinDog</title>
  <link href="css/style.css" rel="stylesheet">

<body>

  <!-- Title -->
  <section id="title" class="gradient-background">
    <div class="container-fluid">
      <div class="row align-items-center">
        <div class="col-lg-6">
          <h1 class="display-5 fw-bold text-body-emphasis lh-1 mb-3">Meet new and interesting dogs nearby.</h1>
          <div class="d-grid gap-2 d-md-flex justify-content-md-start mt-4">
            <button type="button" class="btn btn-light btn-lg px-4 me-md-2 d-inline-flex align-items-center"><img src="images/apple.svg" class="me-2">Download</button>
            <button type="button" class="btn btn-outline-light btn-lg px-4">Download</button>
          </div>
        </div>
        <div class="col-lg-6 text-center">
          <img class="title-image" src="images/iphone.png" alt="iphone-mockup">
        </div>
      </div>
    </div>

  </section>
  <!-- Features -->
  <section id="features">

  </section>
  <!-- Testimonial -->
  <section id="testimonial">

  </section>
  <!-- Pricing -->
  <section id="pricing">

  </section>
  <!-- Footer -->
  <section id="footer">

  </section>
